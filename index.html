<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>WAR Counters - Marvel Church</title>
</head>

<body>

    
    <header class="painel-controle">

    <h1>
    <span class="destaque">New Asgard Brasil</span>
    </h1>

    <div class="painel-data">
    <h2>PAINEL DE ATAQUE</h2>
    <span class="data">📅 18/04/2026</span>
    </div>
    
    <h3 class="titulo-sessao">FILTRAR DADOS </h3>

    <div class="painel-lateral">
    
        <div class="campo-busca">
            <label>Defesa:</label>
            <input type="text" class="chave" id="busca-nome" placeholder="Digite...">
            <button type="button" class="limpar-chave" id="btn-limpar">Limpar</button>
        </div>

        <div class="campo-checks">
            <label>Vantagem:</label>
            <div class="opcoes-coluna">
                <label><input type="checkbox" class="check-rating" value="3">▲▲▲</label>
                <label><input type="checkbox" class="check-rating" value="2">▲▲</label>
                <label><input type="checkbox"class="check-rating"  value="1">▲</label>
            </div>
        </div>

        <div class="campo-busca">
            <label>Ataque:</label>
            <input type="text" class="chave" id="busca-nomeAtk" placeholder="Digite...">
            <button type="button" class="limpar-chave" id="btn-limparAtk">Limpar</button>
        </div>

    </div>

    </header>

    <main>

        <div id="lista-counters">
        </div>

        <script src="counters.js"></script>
        <script src="dicionario.js"></script>
        <script src="appbkp.js"></script>


    </main>

    <!-- MODAL -->
    <div id="obsModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="fecharModal()">&times;</span>
            <h3 id="modal-adversario" style="color: gray; font-size: 0.9em; margin-bottom: 5px;"></h3>
            <h2 id="modal-titulo" style="font-size: 1em; margin-bottom: 5px;"></h2>
            <hr>
            <p id="modal-obs"></p>
        </div>
    </div>
    
</body>
</html>
